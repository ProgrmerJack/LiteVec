name: Benchmarks

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run distance benchmarks
        run: cargo bench -p litevec-core --bench distance_bench -- --output-format bencher | tee output_distance.txt

      - name: Run search benchmarks
        run: cargo bench -p litevec-core --bench search_bench -- --output-format bencher | tee output_search.txt

      - name: Run insert benchmarks
        run: cargo bench -p litevec-core --bench insert_bench -- --output-format bencher | tee output_insert.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: output_*.txt
