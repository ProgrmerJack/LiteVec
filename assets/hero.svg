<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="node-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
  </g>

  <!-- Vector graph network — left side -->
  <g filter="url(#glow)">
    <!-- Edges (connections between nodes) -->
    <line x1="90" y1="80" x2="180" y2="130" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="90" y1="80" x2="140" y2="200" stroke="#58a6ff" stroke-width="1.5" opacity="0.3"/>
    <line x1="180" y1="130" x2="140" y2="200" stroke="#bc8cff" stroke-width="1.5" opacity="0.4"/>
    <line x1="180" y1="130" x2="280" y2="100" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>
    <line x1="180" y1="130" x2="250" y2="210" stroke="#bc8cff" stroke-width="1.5" opacity="0.3"/>
    <line x1="140" y1="200" x2="250" y2="210" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="280" y1="100" x2="250" y2="210" stroke="#bc8cff" stroke-width="1.5" opacity="0.3"/>
    <line x1="280" y1="100" x2="330" y2="170" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="250" y1="210" x2="330" y2="170" stroke="#bc8cff" stroke-width="1.5" opacity="0.5"/>
    <line x1="90" y1="80" x2="60" y2="180" stroke="#58a6ff" stroke-width="1" opacity="0.2"/>
    <line x1="60" y1="180" x2="140" y2="200" stroke="#bc8cff" stroke-width="1" opacity="0.2"/>
    <line x1="280" y1="100" x2="320" y2="60" stroke="#58a6ff" stroke-width="1" opacity="0.2"/>
    <line x1="330" y1="170" x2="350" y2="240" stroke="#bc8cff" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#glow)">
    <circle cx="90" cy="80" r="6" fill="url(#node-glow)"/>
    <circle cx="180" cy="130" r="8" fill="url(#node-glow)"/>
    <circle cx="140" cy="200" r="5" fill="url(#node-glow)"/>
    <circle cx="280" cy="100" r="7" fill="url(#node-glow)"/>
    <circle cx="250" cy="210" r="6" fill="url(#node-glow)"/>
    <circle cx="330" cy="170" r="5" fill="url(#node-glow)"/>
    <circle cx="60" cy="180" r="4" fill="#58a6ff" opacity="0.5"/>
    <circle cx="320" cy="60" r="4" fill="#bc8cff" opacity="0.5"/>
    <circle cx="350" cy="240" r="4" fill="#58a6ff" opacity="0.5"/>
  </g>

  <!-- Search query vector — highlighted -->
  <g filter="url(#soft-glow)">
    <circle cx="180" cy="130" r="20" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>
    <circle cx="180" cy="130" r="35" fill="none" stroke="#bc8cff" stroke-width="0.5" opacity="0.15" stroke-dasharray="2 4"/>
  </g>

  <!-- Right side graph cluster -->
  <g filter="url(#glow)">
    <line x1="700" y1="60" x2="760" y2="120" stroke="#58a6ff" stroke-width="1" opacity="0.25"/>
    <line x1="760" y1="120" x2="820" y2="80" stroke="#bc8cff" stroke-width="1" opacity="0.25"/>
    <line x1="760" y1="120" x2="730" y2="190" stroke="#58a6ff" stroke-width="1" opacity="0.2"/>
    <line x1="730" y1="190" x2="810" y2="200" stroke="#bc8cff" stroke-width="1" opacity="0.25"/>
    <line x1="820" y1="80" x2="860" y2="150" stroke="#58a6ff" stroke-width="1" opacity="0.2"/>
    <line x1="860" y1="150" x2="810" y2="200" stroke="#bc8cff" stroke-width="1" opacity="0.25"/>
    <line x1="700" y1="60" x2="730" y2="190" stroke="#58a6ff" stroke-width="1" opacity="0.15"/>
    <line x1="810" y1="200" x2="780" y2="260" stroke="#bc8cff" stroke-width="1" opacity="0.15"/>

    <circle cx="700" cy="60" r="4" fill="#58a6ff" opacity="0.5"/>
    <circle cx="760" cy="120" r="5" fill="url(#node-glow)"/>
    <circle cx="820" cy="80" r="4" fill="#bc8cff" opacity="0.5"/>
    <circle cx="730" cy="190" r="4" fill="url(#node-glow)"/>
    <circle cx="810" cy="200" r="5" fill="url(#node-glow)"/>
    <circle cx="860" cy="150" r="3" fill="#58a6ff" opacity="0.4"/>
    <circle cx="780" cy="260" r="3" fill="#bc8cff" opacity="0.3"/>
  </g>

  <!-- Main text -->
  <text x="450" y="115" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="56" font-weight="700" fill="url(#accent)" letter-spacing="-1">
    LiteVec
  </text>

  <!-- Tagline -->
  <text x="450" y="155" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#8b949e" letter-spacing="1">
    The SQLite of Vector Search
  </text>

  <!-- Feature badges -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#8b949e">
    <!-- Pure Rust badge -->
    <rect x="325" y="180" width="90" height="26" rx="13" fill="none" stroke="#30363d" stroke-width="1"/>
    <text x="370" y="197" text-anchor="middle" fill="#c9d1d9">🦀 Pure Rust</text>

    <!-- Zero Deps badge -->
    <rect x="425" y="180" width="90" height="26" rx="13" fill="none" stroke="#30363d" stroke-width="1"/>
    <text x="470" y="197" text-anchor="middle" fill="#c9d1d9">📦 Single File</text>

    <!-- HNSW badge -->
    <rect x="525" y="180" width="70" height="26" rx="13" fill="none" stroke="#30363d" stroke-width="1"/>
    <text x="560" y="197" text-anchor="middle" fill="#c9d1d9">⚡ HNSW</text>

    <!-- Bottom row -->
    <rect x="345" y="216" width="100" height="26" rx="13" fill="none" stroke="#30363d" stroke-width="1"/>
    <text x="395" y="233" text-anchor="middle" fill="#c9d1d9">🔍 SIMD Search</text>

    <rect x="455" y="216" width="110" height="26" rx="13" fill="none" stroke="#30363d" stroke-width="1"/>
    <text x="510" y="233" text-anchor="middle" fill="#c9d1d9">🐍 Python + Rust</text>
  </g>

  <!-- Decorative bottom border -->
  <rect x="350" y="260" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>
</svg>
