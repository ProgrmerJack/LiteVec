<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <style>
      .terminal-text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace; font-size: 13px; }
      .prompt { fill: #58a6ff; }
      .command { fill: #c9d1d9; }
      .output { fill: #8b949e; }
      .success { fill: #3fb950; }
      .highlight { fill: #d2a8ff; }
      .number { fill: #79c0ff; }
    </style>
  </defs>

  <!-- Terminal window -->
  <rect width="800" height="520" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="10" fill="#161b22"/>
  <rect y="26" width="800" height="10" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" class="terminal-text" fill="#8b949e" font-size="12">LiteVec — 30-Second Demo</text>

  <!-- Terminal content -->
  <g transform="translate(16, 52)">
    <!-- Line 1: Create project -->
    <text y="0" class="terminal-text">
      <tspan class="prompt">❯ </tspan>
      <tspan class="command">cargo new my-app &amp;&amp; cd my-app</tspan>
    </text>
    <text y="18" class="terminal-text output">     Created binary (application) `my-app` package</text>

    <!-- Line 2: Add litevec -->
    <text y="44" class="terminal-text">
      <tspan class="prompt">❯ </tspan>
      <tspan class="command">cargo add litevec serde_json</tspan>
    </text>
    <text y="62" class="terminal-text output">    Updating crates.io index</text>
    <text y="80" class="terminal-text success">      Adding litevec v0.1.0</text>

    <!-- Line 3: Write code -->
    <text y="106" class="terminal-text">
      <tspan class="prompt">❯ </tspan>
      <tspan class="command">cat src/main.rs</tspan>
    </text>
    <text y="124" class="terminal-text highlight">use</tspan> litevec::Database;</text>
    <text y="142" class="terminal-text highlight">use</tspan> serde_json::json;</text>
    <text y="160" class="terminal-text command"></text>
    <text y="178" class="terminal-text highlight">fn</tspan> main() {</text>
    <text y="196" class="terminal-text command">    let db = Database::open("my.db").unwrap();</text>
    <text y="214" class="terminal-text command">    let col = db.create_collection("docs", 3).unwrap();</text>
    <text y="232" class="terminal-text command">    col.insert("cat",  &amp;[1.0, 0.0, 0.0], json!({"animal": "cat"})).unwrap();</text>
    <text y="250" class="terminal-text command">    col.insert("dog",  &amp;[0.9, 0.1, 0.0], json!({"animal": "dog"})).unwrap();</text>
    <text y="268" class="terminal-text command">    col.insert("fish", &amp;[0.0, 0.0, 1.0], json!({"animal": "fish"})).unwrap();</text>
    <text y="286" class="terminal-text command">    let results = col.search(&amp;[0.95, 0.05, 0.0], 2).execute().unwrap();</text>
    <text y="304" class="terminal-text command">    for r in &amp;results { println!("{}: {:.4}", r.id, r.distance); }</text>
    <text y="322" class="terminal-text highlight">}</text>

    <!-- Line 4: Run -->
    <text y="348" class="terminal-text">
      <tspan class="prompt">❯ </tspan>
      <tspan class="command">cargo run --release</tspan>
    </text>
    <text y="366" class="terminal-text output">   Compiling my-app v0.1.0</text>
    <text y="384" class="terminal-text output">    Finished release [optimized] target(s) in 3.2s</text>
    <text y="402" class="terminal-text success">cat: 0.0014</text>
    <text y="420" class="terminal-text success">dog: 0.0017</text>

    <!-- Line 5: Check file -->
    <text y="446" class="terminal-text">
      <tspan class="prompt">❯ </tspan>
      <tspan class="command">ls -la my.db*</tspan>
    </text>
    <text y="464" class="terminal-text output">-rw-r--r-- 1 user user  8.2K  my.db</text>
    <text y="482" class="terminal-text output">-rw-r--r-- 1 user user   412  my.db.snap  ← data persisted! ✨</text>
  </g>
</svg>
